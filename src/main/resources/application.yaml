spring:
  application:
    name: mini-doodle

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:doodle}
    username: ${DB_USER:doodle}
    password: ${DB_PASSWORD:doodle}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, Hibernate only verifies it matches
    open-in-view: false    # avoid lazy-loading surprises outside the transaction boundary
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration